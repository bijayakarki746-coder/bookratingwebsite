<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Book - Admin Panel</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">My Reading Log</a>
            <nav>
                <a href="index.html">HOME</a>
                <a href="about.html">ABOUT</a>
                <a href="contact.html">CONTACT</a>
                <a href="admin.html" class="active admin-only">ADD BOOK</a>     
                <a href="login.html" id="nav-login-btn" class="nav-login">LOGIN</a>
            </nav>
            <div class="auth-controls">
                <div id="logged-in-user" class="hidden">
                    <span class="badge" id="user-role-badge">admin</span>
                    <button id="logout-btn" class="logout-icon">Logout ↛</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container page-small id="admin-gate-content">
        <section class="hero">
            <span class="subtitle">🔒 ADMIN PANEL</span>
            <h1 id="form-title">Add a new book</h1>
            <p>Fill in the details below to write to the reading log.</p>
        </section>

        <form id="book-form" class="form-card">
            <input type="hidden" id="book-id">
            
            <div class="form-group">
                <label>YOUR RATING</label>
                <div class="star-rating-input">
                    <span class="star-btn" data-val="1">★</span>
                    <span class="star-btn" data-val="2">★</span>
                    <span class="star-btn" data-val="3">★</span>
                    <span class="star-btn" data-val="4">★</span>
                    <span class="star-btn" data-val="5">★</span>
                </div>
                <input type="hidden" id="book-rating" value="0" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>BOOK TITLE</label>
                    <input type="text" id="book-title" required placeholder="e.g. Crime and Punishment">
                </div>
                <div class="form-group">
                    <label>AUTHOR</label>
                    <input type="text" id="book-author" required placeholder="e.g. Fyodor Dostoevsky">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>GENRE</label>
                    <input type="text" id="book-genre" required placeholder="e.g. Psychological Fiction">
                </div>
                <div class="form-group">
                    <label>PUBLICATION YEAR</label>
                    <input type="number" id="book-year" required placeholder="2026">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>PAGES</label>
                    <input type="number" id="book-pages" placeholder="0">
                </div>
                <div class="form-group">
                    <label>COVER IMAGE URL</label>
                    <input type="url" id="book-cover" placeholder="https://images.unsplash.com/...">
                </div>
            </div>

            <div class="form-group">
                <label>DATE READ</label>
                <input type="text" id="book-dateread" placeholder="e.g. April 2026">
            </div>

            <div class="form-group">
                <label>SYNOPSIS</label>
                <textarea id="book-synopsis" rows="3" placeholder="Brief description..."></textarea>
            </div>

            <div class="form-group">
                <label>FAVOURITE QUOTE</label>
                <textarea id="book-quote" rows="2" placeholder="A memorable line from the book..."></textarea>
            </div>

            <div class="form-group">
                <label>QUOTE CONTEXT</label>
                <input type="text" id="book-context" placeholder="Who said it and when...">
            </div>

            <div class="form-group">
                <label>YOUR REVIEW</label>
                <textarea id="book-review" rows="4" placeholder="Your thoughts on the book..."></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" id="submit-btn" class="btn-submit">+ ADD BOOK</button>
                <button type="button" onclick="window.location.href='index.html'" class="btn-cancel">CANCEL</button>
            </div>
        </form>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
